<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; }
        h2 { color: #128C7E; margin-top: 0; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; background: #25D366; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #128C7E; }
        #error { color: #dc3545; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔒 Gateway Login</h2>
    <div id="error">Username atau password salah!</div>
    <form id="loginForm" onsubmit="doLogin(event)">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Masuk</button>
    </form>
</div>

<script>
async function doLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const btn = document.querySelector('button');
    btn.innerText = 'Loading...';

    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    
    if (data.success) {
        window.location.href = '/';
    } else {
        document.getElementById('error').style.display = 'block';
        btn.innerText = 'Masuk';
    }
}
</script>

</body>
</html>
